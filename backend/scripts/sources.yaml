# Complex Style（无稳定官方 RSS，使用 crawl）
- name: Complex Style
  type: crawl
  lang: en
  category: 潮流街头
  enabled: true
  max_articles: 15
  start_urls:
    - https://www.complex.com/style
  allowed_domains:
    - www.complex.com
    - complex.com
  discovery:
    link_selectors:
      - a[href*="/style/"]
    article_url_patterns:
      - complex\.com/style/a/.+
    exclude_patterns:
      - /video/
      - /tag/
      - /shop
    max_pages: 1

# Glamour UK（无单独官方 RSS，使用 crawl）
- name: Glamour UK
  type: crawl
  lang: en
  category: 高端时装
  enabled: true
  max_articles: 12
  start_urls:
    - https://www.glamourmagazine.co.uk/fashion
  allowed_domains:
    - glamourmagazine.co.uk
    - www.glamourmagazine.co.uk
  discovery:
    link_selectors:
      - a[href*="/article/"]
      - a[href*="/gallery/"]
    article_url_patterns:
      - glamourmagazine\.co\.uk/(article|gallery)/.+
    exclude_patterns:
      - /topic/
      - /shopping/
    max_pages: 1

# CR Fashion Book（首页可见 fashion 流，未发现稳定官方 RSS）
- name: CR Fashion Book
  type: crawl
  lang: en
  category: 高端时装
  enabled: true
  max_articles: 12
  start_urls:
    - https://crfashionbook.com/
  allowed_domains:
    - crfashionbook.com
  discovery:
    link_selectors:
      - a[href]
    article_url_patterns:
      - crfashionbook\.com/(?!about/?$)(?!fashion/?$)(?!beauty/?$)(?!culture/?$)(?!lifestyle/?$)[a-z0-9-]+/?$
    exclude_patterns:
      - /category/
      - /tag/
      - /author/
      - /search
    max_pages: 1

