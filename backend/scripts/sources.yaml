# Fashion Feed — 信源配置
# 修改此文件即可增删改 RSS 或 Crawl 信源，无需改动 Python 脚本
#
# 兼容说明:
#   - 旧格式若只写 `url`，默认按 RSS 处理
#   - 新格式可显式声明 `type: rss` 或 `type: crawl`
#
# RSS 字段:
#   name:         源名称（显示在前端）
#   url/feed_url: RSS Feed URL
#   lang:         语言代码 (en / ja / zh / fr / ko 等)
#   category:     默认分类（LLM 可能会重新分类）
#   enabled:      是否启用（false 则跳过）
#   max_articles: 每次最多抓取文章数（可选，默认 30）
#
# Crawl 字段:
#   type:                crawl
#   start_urls:          列表页入口
#   allowed_domains:     允许抓取的域名白名单
#   discovery:
#     link_selectors:    列表页文章链接 CSS selector
#     article_url_patterns: 文章链接正则（可选，但建议配置）
#     exclude_patterns:  排除链接正则
#     pagination_selectors: 下一页 CSS selector（可选）
#     max_pages:         最多翻页数
#   detail:
#     title_selectors:    标题 selector
#     content_selectors:  正文 selector
#     published_selectors: 发布时间 selector
#     image_selectors:    主图 selector
#     remove_selectors:   提取正文时需剔除的区域
#
# Crawl 模板（默认关闭，填入真实站点后启用）:
# - name: Example Crawl Source
#   type: crawl
#   enabled: false
#   lang: zh
#   category: 品牌/市场
#   max_articles: 20
#   start_urls:
#     - https://example.com/fashion
#   allowed_domains:
#     - example.com
#   discovery:
#     link_selectors:
#       - article a[href]
#       - .post-list a[href]
#     article_url_patterns:
#       - /fashion/
#       - /news/
#     exclude_patterns:
#       - /tag/
#       - /video/
#     pagination_selectors:
#       - a.next
#     max_pages: 2
#   detail:
#     title_selectors:
#       - h1
#     content_selectors:
#       - article
#       - .article-body
#     published_selectors:
#       - time[datetime]
#     image_selectors:
#       - meta[property='og:image']
#       - article img
#     remove_selectors:
#       - .ad
#       - .newsletter

