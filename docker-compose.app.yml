services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    command:
      - uv
      - run
      - --project
      - backend
      - uvicorn
      - backend.app.app_main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    ports:
      - "8000:8000"
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    command:
      - uv
      - run
      - --project
      - backend
      - python
      - backend/app/scripts/run_celery_worker.py
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    command:
      - uv
      - run
      - --project
      - backend
      - python
      - backend/app/scripts/run_scheduler.py
      - --interval-seconds
      - "300"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_FEISHU_APP_ID: ${VITE_FEISHU_APP_ID:-}
        VITE_FEISHU_SCOPE_LIST: ${VITE_FEISHU_SCOPE_LIST:-}
        VITE_BASE_URL: ${VITE_BASE_URL:-/}
    depends_on:
      - backend
    ports:
      - "3000:80"
    restart: unless-stopped

  demo-init:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    profiles:
      - init
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    command:
      - uv
      - run
      - --project
      - backend
      - python
      - backend/app/scripts/init_recent_demo_digests.py
    restart: "no"
