# Fashion Feed — RSS 订阅源配置
# 修改此文件即可增删改 RSS 源，无需改动 Python 脚本
#
# 字段说明:
#   name:     源名称（显示在前端）
#   url:      RSS Feed URL
#   lang:     语言代码 (en / ja / zh / fr / ko 等)
#   category: 默认分类（LLM 可能会重新分类）
#   enabled:  是否启用（false 则跳过）
#   max_articles: 每次从该源最多抓取的文章数（可选，默认 30）

# ─── 英文源 ──────────────────────────────────────────

# Vogue 系列
- name: Vogue
  url: https://www.vogue.com/feed/rss
  lang: en
  category: 高端时装
  enabled: true
  max_articles: 30

